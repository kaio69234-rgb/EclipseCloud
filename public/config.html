<!DOCTYPE html>
<html>

<head>

<title>eclipsecloud.config</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
color:#2ecc71;
font-size:40px;
}

.box{
background:#111;
border:1px solid #1f3f2b;
border-radius:10px;
padding:25px;
margin-bottom:25px;
}

.box h2{
color:#2ecc71;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
color:#aaa;
}

input,select{

width:100%;
padding:12px;
background:#0f0f0f;
border:1px solid #2ecc71;
border-radius:6px;
color:white;

}

button{

padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;

}

.generate{

background:#2ecc71;
color:black;

}

.preview{

background:black;
border-radius:8px;
padding:15px;
margin-top:15px;
font-family:monospace;

}

.top-buttons{

display:flex;
justify-content:flex-end;
gap:10px;

}

.copy{

background:#1f3f2b;
color:#2ecc71;

}

.download{

background:#2ecc71;
color:black;

}

</style>

</head>

<body>

<div class="container">

<div class="title">

<h1>⚙ eclipsecloud.config</h1>
<p>Gerador inteligente para configurar bots</p>

</div>

<div class="box">

<h2>⚙ Configuração</h2>

<h3>Campos Obrigatórios</h3>

<label>Arquivo Principal *</label>
<input id="main" value="index.js">

<h3>Campos Opcionais</h3>

<label>Tipo</label>
<select id="type">
<option>bot</option>
<option>site</option>
</select>

<label>RAM (MB)</label>
<input id="ram" value="100">

<label>Nome</label>
<input id="name" placeholder="Meu Bot Incrível">

<label>Avatar URL</label>
<input id="avatar" placeholder="https://example.com/avatar.png">

<label>Pacotes APT</label>
<input id="apt" placeholder="tools, ffmpeg, canvas">

<label>Comando de início</label>
<input id="start" value="npm run start">

<label>Comando de build</label>
<input id="build" value="npm run build">

<label>Auto Restart</label>
<select id="restart">
<option>true</option>
<option>false</option>
</select>

<button class="generate" onclick="gerar()">Gerar Config</button>

</div>

<div class="box">

<div class="top-buttons">

<button class="copy" onclick="copiar()">Copiar</button>
<button class="download" onclick="baixar()">Baixar</button>

</div>

<h2>Preview do Arquivo</h2>

<div class="preview">

<pre id="output">MAIN=index.js</pre>

</div>

</div>

</div>

<script>

function gerar(){

let main=document.getElementById("main").value
let type=document.getElementById("type").value
let ram=document.getElementById("ram").value
let name=document.getElementById("name").value
let avatar=document.getElementById("avatar").value
let apt=document.getElementById("apt").value
let start=document.getElementById("start").value
let build=document.getElementById("build").value
let restart=document.getElementById("restart").value

let config=`MAIN=${main}
TYPE=${type}
RAM=${ram}
NAME=${name}
AVATAR=${avatar}
APT=${apt}
START=${start}
BUILD=${build}
AUTORESTART=${restart}`

document.getElementById("output").textContent=config

}

function copiar(){

let texto=document.getElementById("output").textContent

navigator.clipboard.writeText(texto)

alert("Config copiada!")

}

function baixar(){

let texto=document.getElementById("output").textContent

let blob=new Blob([texto],{type:"text/plain"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="eclipsecloud.config"

link.click()

}

</script>

</body>

</html>
