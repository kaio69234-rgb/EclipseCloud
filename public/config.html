<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>eclipsecloud.config</title><link rel="stylesheet" href="/css/style.css"><style>

</style></head><body><header><h3>☁ EclipseCloud</h3><nav><a href="/">Início</a>
<a href="/planos.html">Planos</a>
<a href="/docs.html">Documentação</a>

</nav></header><div class="container"><div class="title"><h1>eclipsecloud.config</h1><p>Gerador inteligente para configurar bots</p></div><div class="config-box"><h2>⚙ Configuração</h2><label>Arquivo principal *</label>
<input id="main" value="index.js">

<label>Tipo</label>
<select id="type">

<option>bot</option>
<option>site</option>
<option>api</option>
</select><label>RAM (MB)</label>
<input id="ram" value="100">

<label>Nome</label>
<input id="name" placeholder="Meu Bot Incrível">

<label>Avatar URL</label>
<input id="avatar" placeholder="https://site.com/avatar.png">

<label>Pacotes APT</label>
<input id="apt" placeholder="ffmpeg, canvas">

<label>Comando de início</label>
<input id="start" value="npm start">

<label>Comando de build</label>
<input id="build" value="npm run build">

<label>Auto Restart</label>
<select id="restart">

<option>true</option>
<option>false</option>
</select><button onclick="gerar()">Gerar Config</button>

</div><div class="preview"><h2>Preview do Arquivo</h2><pre id="output">

MAIN=index.js

</pre><div class="actions"><button onclick="copiar()">Copiar</button>

<button onclick="baixar()">Baixar</button>

</div></div></div><script>

function gerar(){

let main=document.getElementById("main").value
let type=document.getElementById("type").value
let ram=document.getElementById("ram").value
let name=document.getElementById("name").value
let avatar=document.getElementById("avatar").value
let apt=document.getElementById("apt").value
let start=document.getElementById("start").value
let build=document.getElementById("build").value
let restart=document.getElementById("restart").value

let config=

`MAIN=${main}
TYPE=${type}
RAM=${ram}
NAME=${name}
AVATAR=${avatar}
APT=${apt}
START=${start}
BUILD=${build}
AUTORESTART=${restart}`

document.getElementById("output").textContent=config

}

function copiar(){

let texto=document.getElementById("output").textContent

navigator.clipboard.writeText(texto)

alert("Config copiada!")

}

function baixar(){

let texto=document.getElementById("output").textContent

let blob=new Blob([texto],{type:"text/plain"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="eclipsecloud.config"

link.click()

}

</script></body>
</html>
