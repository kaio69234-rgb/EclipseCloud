<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EclipseCloud • Gerador eclipse.config</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#050707;
color:white;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:60px 25px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:50px;
}

.header h1{
font-size:40px;
}

.header span{
color:#22c55e;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* CARD */

.card{
background:#0f1412;
border:1px solid #1f2937;
border-radius:14px;
padding:25px;
animation:fadeUp .6s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card h3{
margin-bottom:20px;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
background:#050707;
border:1px solid #1f2937;
border-radius:8px;
color:white;
margin-bottom:15px;
}

/* BUTTON */

.btn{
background:#22c55e;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:#1fb255;
}

/* PREVIEW */

.preview{
background:black;
border-radius:10px;
padding:20px;
font-family:monospace;
white-space:pre-wrap;
color:#22c55e;
margin-top:10px;
}

/* ACTIONS */

.actions{
margin-top:15px;
display:flex;
gap:10px;
}

/* ICON GRID */

.icons{
margin-top:50px;
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.icons img{
width:45px;
opacity:.8;
transition:.3s;
}

.icons img:hover{
opacity:1;
transform:scale(1.1);
}

/* MOBILE */

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Gerador <span>eclipse.config</span></h1>
<p>Configure sua aplicação em segundos</p>

</div>

<div class="grid">

<!-- FORM -->

<div class="card">

<h3>Configuração</h3>

<input id="name" placeholder="NAME (Meu Bot)">
<input id="main" placeholder="MAIN (index.js)">
<input id="ram" placeholder="RAM (100)">
<input id="start" placeholder="START (npm start)">
<input id="build" placeholder="BUILD (npm install)">

<select id="type">
<option value="bot">bot</option>
<option value="site">site</option>
</select>

<button class="btn" onclick="gerar()">
Gerar eclipse.config
</button>

</div>

<!-- PREVIEW -->

<div class="card">

<h3>Preview</h3>

<div id="preview" class="preview">
NAME=app
TYPE=bot
MAIN=index.js
RAM=100
</div>

<div class="actions">

<button class="btn" onclick="copiar()">
Copiar
</button>

<button class="btn" onclick="baixar()">
Baixar
</button>

</div>

</div>

</div>

<!-- ICONES -->

<div class="icons">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg">

</div>

</div>

<script>

function gerar(){

let name=document.getElementById("name").value||"app"
let main=document.getElementById("main").value||"index.js"
let ram=document.getElementById("ram").value||"100"
let start=document.getElementById("start").value
let build=document.getElementById("build").value
let type=document.getElementById("type").value

let config=
`NAME=${name}
TYPE=${type}
MAIN=${main}
RAM=${ram}
START=${start}
BUILD=${build}`

document.getElementById("preview").innerText=config

}

/* COPIAR */

function copiar(){

let text=document.getElementById("preview").innerText

navigator.clipboard.writeText(text)

alert("Config copiada!")

}

/* BAIXAR */

function baixar(){

let text=document.getElementById("preview").innerText

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="eclipse.config"

a.click()

}

</script>

</body>
</html>
