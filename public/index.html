<!-- DASHBOARD -->

<div id="dashboard" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#050707;
z-index:999;
overflow:auto;
padding:40px;
">

<h1 style="margin-bottom:30px;">Painel EclipseCloud</h1>

<div style="
background:#0f1412;
padding:30px;
border-radius:10px;
margin-bottom:20px;
">

<h2>Controle do Bot</h2>

<button onclick="startBot()" style="
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
">Start</button>

<button onclick="stopBot()" style="
padding:10px 20px;
background:#ef4444;
border:none;
border-radius:6px;
cursor:pointer;
">Stop</button>

<button onclick="closePanel()" style="
padding:10px 20px;
background:#111;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:10px;
color:white;
">Fechar</button>

<p id="statusBot" style="margin-top:15px;color:#9ca3af">
Status: desconhecido
</p>

</div>

<div style="
background:#0f1412;
padding:30px;
border-radius:10px;
margin-bottom:20px;
">

<h2>Upload de Bot</h2>

<form id="uploadForm">

<input type="file" id="botFile" style="margin-top:10px;color:white">

<button type="submit" style="
margin-top:10px;
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
">Enviar Bot</button>

</form>

<p id="uploadStatus" style="margin-top:10px;color:#9ca3af"></p>

</div>

<div style="
background:#0f1412;
padding:30px;
border-radius:10px;
margin-bottom:20px;
">

<h2>Aplicações</h2>

<ul id="botList" style="color:#9ca3af;list-style:none">

<li>BunnyBot — Online</li>
<li>APICloud — Offline</li>
<li>SiteNode — Online</li>

</ul>

</div>

<div style="
background:#0f1412;
padding:30px;
border-radius:10px;
">

<h2>Logs</h2>

<pre id="logs" style="
background:#000;
padding:15px;
border-radius:6px;
height:200px;
overflow:auto;
"></pre>

</div>

</div>

<script>

const painelBtn = document.querySelector('a[href="/dashboard"]')

painelBtn.addEventListener("click",function(e){
e.preventDefault()
document.getElementById("dashboard").style.display="block"
})

function closePanel(){
document.getElementById("dashboard").style.display="none"
}

function startBot(){

fetch("/start")
.then(r=>r.text())
.then(t=>{
document.getElementById("statusBot").innerText="Status: Online"
alert(t)
})

}

function stopBot(){

fetch("/stop")
.then(r=>r.text())
.then(t=>{
document.getElementById("statusBot").innerText="Status: Offline"
alert(t)
})

}

document.getElementById("uploadForm").addEventListener("submit",function(e){

e.preventDefault()

const file = document.getElementById("botFile").files[0]

if(!file){
alert("Selecione um arquivo ZIP do bot")
return
}

const formData = new FormData()
formData.append("bot",file)

fetch("/upload",{
method:"POST",
body:formData
})
.then(r=>r.text())
.then(t=>{
document.getElementById("uploadStatus").innerText=t
})

})

  </script>
