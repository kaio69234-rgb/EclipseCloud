<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EclipseCloud</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script src="https://unpkg.com/scrollreveal"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial;
}

body{
background:#050707;
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* PARTICLES */

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
pointer-events:none;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100vh;
background:#050707;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:4px solid #1f2937;
border-top:4px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #111;
max-width:1200px;
margin:auto;
}

.logo{
font-size:22px;
color:#22c55e;
font-weight:700;
}

.navbar ul{
display:flex;
gap:22px;
list-style:none;
}

.navbar a{
color:#cbd5e1;
text-decoration:none;
font-size:14px;
transition:.2s;
}

.navbar a:hover{
color:#22c55e;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
max-width:900px;
margin:auto;
}

.hero h1{
font-size:56px;
font-weight:700;
}

.gradient{
background:linear-gradient(90deg,#22c55e,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:#9ca3af;
margin-top:10px;
}

/* TECH ICONS */

.tech{
margin-top:80px;
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.tech img{
width:45px;
opacity:.7;
filter:grayscale(1);
transition:.3s;
}

.tech img:hover{
opacity:1;
transform:scale(1.1);
filter:grayscale(0);
}

/* GENERATOR */

.generator{
max-width:1100px;
margin:auto;
padding:80px 30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

/* PANEL */

.panel{
background:#0f1412;
padding:25px;
border-radius:12px;
border:1px solid #1f2937;
}

.panel h2{
margin-bottom:15px;
}

label{
display:block;
margin-top:12px;
font-size:14px;
color:#9ca3af;
}

input,select{
width:100%;
padding:10px;
margin-top:4px;
border-radius:6px;
border:1px solid #222;
background:#111;
color:white;
outline:none;
}

input:focus,select:focus{
border-color:#22c55e;
}

/* BUTTONS */

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.generate{
margin-top:15px;
background:#22c55e;
color:black;
}

.generate:hover{
opacity:.9;
}

/* PREVIEW */

.preview{
background:#1e1e1e;
border-radius:10px;
overflow:hidden;
border:1px solid #333;
display:flex;
flex-direction:column;
}

.vscode-bar{
background:#2d2d2d;
padding:8px 12px;
font-size:13px;
color:#9ca3af;
}

.code{
padding:15px;
font-family:monospace;
color:#d4d4d4;
min-height:200px;
white-space:pre;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
padding:10px;
border-bottom:1px solid #333;
}

.copy{background:#22c55e;}
.download{background:#3b82f6;}
.share{background:#8b5cf6;}

.actions button{
color:white;
font-size:13px;
}

/* FOOTER */

footer{
margin-top:100px;
padding:40px;
border-top:1px solid #111;
text-align:center;
color:#6b7280;
}

/* MOBILE */

@media(max-width:900px){

.generator{
grid-template-columns:1fr;
}

.hero h1{
font-size:36px;
}

.navbar{
flex-direction:column;
gap:10px;
padding:20px;
}

.navbar ul{
flex-wrap:wrap;
justify-content:center;
}

}

</style>

</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<div id="particles"></div>

<nav class="navbar">

<div class="logo">EclipseCloud</div>

<ul>

<li><a href="#">Início</a></li>
<li><a href="#">Planos</a></li>
<li><a href="#">API</a></li>
<li><a href="#">Docs</a></li>

</ul>

</nav>

<section class="hero">

<h1>

<span id="typing"></span>
<span class="gradient"> Online Agora</span>

</h1>

<p>Hospedagem profissional para Bots e Sites</p>

<div class="tech">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">

</div>

</section>

<section class="generator">

<div class="panel">

<h2>Gerador eclipsecloud.config</h2>

<label>Arquivo principal</label>
<input id="main" value="index.js">

<label>Tipo</label>
<select id="type">
<option value="bot">bot</option>
<option value="site">site</option>
</select>

<label>RAM</label>
<input id="ram" value="100">

<label>Nome</label>
<input id="name">

<label>Start</label>
<input id="start" value="npm start">

<button class="generate" onclick="gerar()">Gerar Config</button>

</div>

<div class="preview">

<div class="vscode-bar">
eclipsecloud.config
</div>

<div class="actions">

<button class="copy" onclick="copiar()">Copiar</button>
<button class="download" onclick="baixar()">Baixar</button>
<button class="share" onclick="compartilhar()">Compartilhar</button>

</div>

<div class="code" id="output">
MAIN=index.js
TYPE=bot
RAM=100
</div>

</div>

</section>

<footer>

© 2026 EclipseCloud

</footer>

<script>

window.addEventListener("load",()=>{
document.getElementById("loader").style.display="none"
})

/* TYPE WRITER */

const text="Seu Bot"
let i=0

function typeWriter(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,90)

}

}

typeWriter()

/* PARTICLES */

tsParticles.load("particles",{
particles:{
number:{value:35},
size:{value:2},
move:{speed:0.6},
opacity:{value:0.3}
}
})

/* SCROLL */

ScrollReveal().reveal('.hero',{distance:'60px',duration:1000})
ScrollReveal().reveal('.panel',{interval:200})

/* GERADOR */

function gerar(){

let main=document.getElementById("main").value
let type=document.getElementById("type").value
let ram=document.getElementById("ram").value
let name=document.getElementById("name").value
let start=document.getElementById("start").value

let config=`MAIN=${main}
TYPE=${type}
RAM=${ram}
NAME=${name}
START=${start}`

document.getElementById("output").textContent=config

}

/* COPIAR */

function copiar(){

navigator.clipboard.writeText(
document.getElementById("output").textContent
)

alert("Copiado!")

}

/* BAIXAR */

function baixar(){

let text=document.getElementById("output").textContent

let blob=new Blob([text])

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="eclipsecloud.config"

link.click()

}

/* SHARE */

function compartilhar(){

if(navigator.share){

navigator.share({
title:"EclipseCloud Config",
text:document.getElementById("output").textContent
})

}else{

alert("Compartilhamento não suportado neste dispositivo.")

}

}

</script>

</body>
</html>
