<!DOCTYPE html>
<html>

<head>

<title>Dashboard - EclipseCloud</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#111;
padding:30px;
border-radius:10px;
margin-top:20px;
}

button{
padding:10px 20px;
background:#00ff9c;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Dashboard EclipseCloud</h1>

<div class="card">

<h2>Upload do Bot</h2>

<form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">

<input type="file" name="bot" id="botFile">

<br><br>

<button>
Enviar Bot
</button>

</form>

</div>

<script>

const form = document.getElementById("uploadForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const fileInput = document.getElementById("botFile")

if(!fileInput.files.length){
alert("Selecione um arquivo ZIP do bot")
return
}

const formData = new FormData()
formData.append("bot", fileInput.files[0])

try{

const res = await fetch("/upload",{
method:"POST",
body:formData
})

const data = await res.json()

alert("Bot enviado com sucesso! ID: " + data.id)

}catch(err){

alert("Erro ao enviar bot")

}

})

</script>

</body>

</html>
